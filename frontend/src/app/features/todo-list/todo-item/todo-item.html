<mat-card (click)="onDelete()">
  <mat-card-content>
    <div class="row">
      <span class="label">{{ constants.completionDateLabel }}</span>
      <span class="value">{{ item().completionDate | date:'dd.MM.yyyy' }}</span>
    </div>
    <div class="row">
      <span class="value">{{ item().description }}</span>
    </div>
  </mat-card-content>
</mat-card>
